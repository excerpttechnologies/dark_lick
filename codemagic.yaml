workflows:
  ios-release:
    name: iOS Release Build (Darklick)
    environment:
      node: 18
      xcode: latest
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.darklick.YOURREALID   # ← fix this
      groups:
        - appstore-connect
      vars:
        XCODE_SCHEME: "Darklick"
        XCODE_WORKSPACE: "ios/Darklick.xcworkspace"
        BUNDLE_ID: "com.darklick.YOURREALID"          # ← fix this
        TEAM_ID: "5YYR6ZRQTZ"
    scripts:
      - name: Install deps
        script: npm install
      - name: Generate iOS
        script: npx expo prebuild --platform ios --clean
      - name: Install pods
        script: cd ios && pod install && cd ..
      - name: Set up code signing
        script: |
          keychain initialize
          keychain add-certificates
          xcode-project use-profiles
      - name: Build IPA
        script: |
          xcodebuild \
            -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -archivePath build/Darklick.xcarchive \
            DEVELOPMENT_TEAM=$TEAM_ID \
            CODE_SIGN_STYLE=Manual \
            PRODUCT_BUNDLE_IDENTIFIER=$BUNDLE_ID \
            archive
      - name: Export IPA
        script: |
          xcodebuild -exportArchive \
            -archivePath build/Darklick.xcarchive \
            -exportOptionsPlist ios/exportOptions.plist \
            -exportPath build
    artifacts:
      - build/**/*.ipa
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY    # ← fixed
        key_id: HN4XD3PCP2
        issuer_id: 48099666-494d-47dc-a15c-f9ecc09cfc21
        submit_to_testflight: true
