workflows:
  ios-release:
    name: iOS Release Build (Darklick)
    environment:
      node: 18
      xcode: 16.2
      groups:
        - appstore-connect
      vars:
        XCODE_SCHEME: "Darklick"
        XCODE_WORKSPACE: "ios/Darklick.xcworkspace"
        BUNDLE_ID: "com.darklick.yourapp"
        TEAM_ID: "5YYR6ZRQTZ"
        APP_STORE_CONNECT_KEY_IDENTIFIER: "HN4XD3PCP2"
        APP_STORE_CONNECT_ISSUER_ID: "48099666-494d-47dc-a15c-f9ecc09cfc21"

    scripts:
      - name: Install deps
        script: npm install

      - name: Generate iOS
        script: npx expo prebuild --platform ios --clean

      - name: Install pods
        script: cd ios && pod install && cd ..

      - name: Set up code signing
        script: |
          keychain initialize

          app-store-connect fetch-signing-files \
            "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create \
            --platform IOS

          keychain add-certificates

          # Let Codemagic's tool patch the pbxproj automatically
          xcode-project use-profiles

          # Grab the UUID of the installed profile
          PROFILE_PATH=$(ls -t ~/Library/MobileDevice/Provisioning\ Profiles/*.mobileprovision | head -1)
          echo "Profile path: $PROFILE_PATH"

          security cms -D -i "$PROFILE_PATH" > /tmp/profile.plist
          UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /tmp/profile.plist)
          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c "Print Name" /tmp/profile.plist)
          echo "Profile UUID: $UUID"
          echo "Profile Name: $PROFILE_NAME"

          if [ -z "$UUID" ]; then
            echo "ERROR: UUID extraction failed"
            cat /tmp/profile.plist
            exit 1
          fi

          PBXPROJ="ios/Darklick.xcodeproj/project.pbxproj"

          echo "=== Before patch ==="
          grep -E "CODE_SIGN|PROVISIONING|DEVELOPMENT_TEAM" "$PBXPROJ" || true

          # Set CODE_SIGN_STYLE to Manual for all configurations
          sed -i "" "s/CODE_SIGN_STYLE = Automatic;/CODE_SIGN_STYLE = Manual;/g" "$PBXPROJ"
          sed -i "" 's/CODE_SIGN_STYLE = "Automatic";/CODE_SIGN_STYLE = Manual;/g' "$PBXPROJ"

          # Inject DEVELOPMENT_TEAM everywhere it's missing or replace existing
          sed -i "" "s/DEVELOPMENT_TEAM = \"\";/DEVELOPMENT_TEAM = $TEAM_ID;/g" "$PBXPROJ"
          sed -i "" "s/DEVELOPMENT_TEAM = [A-Z0-9]*;/DEVELOPMENT_TEAM = $TEAM_ID;/g" "$PBXPROJ"

          # Inject provisioning profile UUID
          sed -i "" "s/PROVISIONING_PROFILE = .*/PROVISIONING_PROFILE = \"$UUID\";/g" "$PBXPROJ"
          sed -i "" "s/PROVISIONING_PROFILE_SPECIFIER = .*/PROVISIONING_PROFILE_SPECIFIER = \"$PROFILE_NAME\";/g" "$PBXPROJ"

          echo "=== After patch ==="
          grep -E "CODE_SIGN|PROVISIONING|DEVELOPMENT_TEAM" "$PBXPROJ" || true

          # Bump build number
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUMBER" \
            ios/Darklick/Info.plist

          # Export for use in next step
          echo "CM_PROVISIONING_PROFILE=$UUID" >> $CM_ENV
          echo "CM_PROFILE_NAME=$PROFILE_NAME" >> $CM_ENV

      - name: Build IPA
        script: |
          xcodebuild \
            -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -archivePath build/Darklick.xcarchive \
            archive \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PRODUCT_BUNDLE_IDENTIFIER="$BUNDLE_ID" \
            PROVISIONING_PROFILE="$CM_PROVISIONING_PROFILE" \
            PROVISIONING_PROFILE_SPECIFIER="$CM_PROFILE_NAME" \
            2>&1 | tee build_output.txt
          EXIT_CODE=${PIPESTATUS[0]}
          if [ $EXIT_CODE -ne 0 ]; then
            echo "=== BUILD ERRORS ==="
            grep -E "error:" build_output.txt
            exit $EXIT_CODE
          fi

      - name: Export IPA
        script: |
          cat > /tmp/exportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>$TEAM_ID</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>$BUNDLE_ID</key>
              <string>$CM_PROFILE_NAME</string>
            </dict>
            <key>signingStyle</key>
            <string>manual</string>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>uploadBitcode</key>
            <false/>
            <key>compileBitcode</key>
            <false/>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath build/Darklick.xcarchive \
            -exportOptionsPlist /tmp/exportOptions.plist \
            -exportPath build \
            2>&1 | tee export_output.txt

    artifacts:
      - build/**/*.ipa
      - build_output.txt
      - export_output.txt

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
