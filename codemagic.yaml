workflows:
  ios-release:
    name: iOS Release Build (Darklick)
    max_build_duration: 60

    environment:
      node: 18
      xcode: latest
      groups:
        - appstore-connect

      vars:
        XCODE_SCHEME: "Darklick"
        XCODE_WORKSPACE: "ios/Darklick.xcworkspace"
        BUNDLE_ID: "com.darklick.yourapp"

    scripts:
      - name: Install dependencies
        script: |
          npm install

      # ✅ REQUIRED (you removed this earlier)
      - name: Generate iOS project
        script: |
          npx expo prebuild --platform ios --clean

      - name: Install CocoaPods
        script: |
          cd ios
          pod install
          cd ..

      - name: Debug iOS folder
        script: |
          ls -la ios

      # ✅ Code signing (correct way)
      - name: Set up code signing
        script: |
          xcode-project use-profiles

      # ✅ Build
      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa

