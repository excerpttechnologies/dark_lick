workflows:
  ios-release:
    name: iOS Release Build (Darklick)
    max_build_duration: 60

    environment:
      node: 18
      xcode: latest

      vars:
        XCODE_SCHEME: "Darklick"
        BUNDLE_ID: "com.darklick.yourapp"

    scripts:
      - name: Install dependencies
        script: |
          npm install

      # ✅ Generate iOS (critical for Windows users)
      - name: Generate iOS project
        script: |
          npx expo prebuild --platform ios --clean

      - name: Install CocoaPods
        script: |
          cd ios
          pod install
          cd ..

      # ✅ Debug output (keep this)
      - name: Debug iOS folder
        script: |
          echo "iOS contents:"
          ls -la ios

      # ✅ Detect workspace safely
      - name: Detect workspace
        script: |
          WORKSPACE=$(find ios -name "*.xcworkspace" | head -1)

          if [ -z "$WORKSPACE" ]; then
            echo "❌ Workspace not found"
            exit 1
          fi

          echo "WORKSPACE=$WORKSPACE" >> $CM_ENV

      # ✅ Build
      - name: Build archive
        script: |
          xcodebuild \
            -workspace "$WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -archivePath build/$XCODE_SCHEME.xcarchive \
            archive

      # ✅ Export config
      - name: Create exportOptions.plist
        script: |
          cat > ios/exportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
           "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
          </dict>
          </plist>
          EOF

      # ✅ Export IPA
      - name: Export IPA
        script: |
          xcodebuild -exportArchive \
            -archivePath build/$XCODE_SCHEME.xcarchive \
            -exportOptionsPlist ios/exportOptions.plist \
            -exportPath build

    artifacts:
      - build/**/*.ipa

    publishing:
      app_store_connect:
        api_key: ${{APP_STORE_CONNECT_PRIVATE_KEY}}
        issuer_id: ${{APP_STORE_CONNECT_ISSUER_ID}}
        key_id: ${{APP_STORE_CONNECT_KEY_IDENTIFIER}}

      email:
        recipients:
          - excerptechnologies1@gmail.com
