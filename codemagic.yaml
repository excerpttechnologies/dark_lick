workflows:
  ios-release:
    name: iOS Release Build (Darklick)
    max_build_duration: 60

    environment:
      node: 18
      xcode: latest
      groups:
        - appstore-connect                    # ← Must match your environment group name

      vars:
        XCODE_SCHEME: "Darklick"
        BUNDLE_ID: "com.darklick.yourapp"    # ← Change this to your real bundle ID

    scripts:
      - name: Install dependencies
        script: |
          npm install

      - name: Install CocoaPods
        script: |
          cd ios
          pod install
          cd ..

      - name: Build iOS archive
        script: |
          xcode-project build-ipa \
            --workspace "ios/Runner.xcworkspace" \
            --scheme "$XCODE_SCHEME" \
            --export-method app-store

    artifacts:
      - build/**/*.ipa

