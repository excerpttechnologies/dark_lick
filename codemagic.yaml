workflows:
  ios-release:
    name: iOS Release Build (Darklick)
    max_build_duration: 60

    environment:
      node: 18
      xcode: latest

      vars:
        XCODE_SCHEME: "Darklick"
        BUNDLE_ID: "com.darklick.yourapp"

    scripts:
      - name: Install dependencies
        script: |
          npm install

      - name: Install CocoaPods
        script: |
          cd ios
          pod install
          cd ..

      # ✅ Auto-detect workspace (prevents YourApp.xcworkspace issue)
      - name: Detect Xcode workspace
        script: |
          WORKSPACE=$(find ios -name "*.xcworkspace" | head -1)
          echo "Detected workspace: $WORKSPACE"
          echo "WORKSPACE=$WORKSPACE" >> $CM_ENV

      - name: Build iOS archive
        script: |
          xcodebuild \a
            -workspace "$WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -archivePath build/$XCODE_SCHEME.xcarchive archive

      # ✅ Create exportOptions.plist dynamically (avoids missing file error)
      - name: Create exportOptions.plist
        script: |
          cat > ios/exportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
           "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
          </dict>
          </plist>
          EOF

      - name: Export IPA
        script: |
          xcodebuild -exportArchive \
            -archivePath build/$XCODE_SCHEME.xcarchive \
            -exportOptionsPlist ios/exportOptions.plist \
            -exportPath build

    artifacts:
      - build/**/*.ipa

