workflows:
  ios-release:
    name: iOS Release Build (Darklick)
    max_build_duration: 60

    environment:
      node: 18
      xcode: latest
      groups:
        - appstore-connect

      vars:
        XCODE_SCHEME: "Darklick"
        XCODE_WORKSPACE: "ios/Darklick.xcworkspace"
        BUNDLE_ID: "com.darklick.yourapp"

    scripts:
      # 1️⃣ Install deps
      - name: Install dependencies
        script: |
          npm install

      # 2️⃣ Generate iOS (REQUIRED)
      - name: Generate iOS project
        script: |
          npx expo prebuild --platform ios --clean

      # 3️⃣ Install pods
      - name: Install CocoaPods
        script: |
          cd ios
          pod install
          cd ..

      # 4️⃣ FORCE REMOVE MANUAL SIGNING (CRITICAL FIX)
      - name: Fix code signing to Automatic
        script: |
          echo "Fixing signing..."

          # Replace all Manual signing references
          sed -i '' 's/CODE_SIGN_STYLE = Manual/CODE_SIGN_STYLE = Automatic/g' ios/Darklick.xcodeproj/project.pbxproj || true
          sed -i '' 's/ProvisioningStyle = Manual/ProvisioningStyle = Automatic/g' ios/Darklick.xcodeproj/project.pbxproj || true

          # Remove any forced provisioning profile
          sed -i '' '/PROVISIONING_PROFILE_SPECIFIER/d' ios/Darklick.xcodeproj/project.pbxproj || true

      # 5️⃣ Apply Codemagic profiles
      - name: Set up code signing
        script: |
          xcode-project use-profiles

      # 6️⃣ Build (force automatic signing)
      - name: Build IPA
        script: |
          xcodebuild \
            -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -archivePath build/Darklick.xcarchive \
            CODE_SIGN_STYLE=Automatic \
            archive

      # 7️⃣ Export IPA
      - name: Export IPA
        script: |
          cat > ios/exportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
          "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath build/Darklick.xcarchive \
            -exportOptionsPlist ios/exportOptions.plist \
            -exportPath build

    artifacts:
      - build/**/*.ipa

