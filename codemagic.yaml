workflows:
  ios-release:
    name: iOS Release Build (Darklick)
    max_build_duration: 60

    environment:
      node: 18
      xcode: latest
      groups:
        - appstore-connect

      vars:
        XCODE_SCHEME: "Darklick"
        BUNDLE_ID: "com.darklick.yourapp"     # ← Change to your real bundle ID

    scripts:
      - name: Install dependencies
        script: |
          npm install

      - name: Install CocoaPods
        script: |
          cd ios
          pod install
          cd ..

      # Auto-detect workspace
      - name: Detect Xcode workspace
        script: |
          WORKSPACE=$(find . -name "*.xcworkspace" | head -1 || echo "ios/Runner.xcworkspace")
          echo "Detected workspace: $WORKSPACE"
          echo "WORKSPACE=$WORKSPACE" >> $CM_ENV

      # Setup code signing (very important!)
      - name: Set up code signing
        script: |
          xcode-project use-profiles

      # Build IPA
      - name: Build iOS archive
        script: |
          xcode-project build-ipa \
            --workspace "$WORKSPACE" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - build/**/*.ipa

