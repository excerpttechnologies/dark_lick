workflows:
  ios-release:
    name: iOS Release Build (Darklick)

    environment:
      node: 18
      xcode: latest

      vars:
        XCODE_SCHEME: "Darklick"
        XCODE_WORKSPACE: "ios/Darklick.xcworkspace"

      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.darklick.app   # ← CHANGE if different

    scripts:
      - name: Install dependencies
        script: npm install

      - name: Generate iOS project
        script: npx expo prebuild --platform ios --clean

      - name: Install CocoaPods
        script: |
          cd ios
          pod install
          cd ..

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/**/*.ipa

    publishing:
      app_store_connect:
        submit_to_testflight: true
