workflows:
  ios-release:
    name: iOS Release Build (Darklick)
    max_build_duration: 60

    environment:
      node: 18
      xcode: latest
      groups:
        - appstore-connect   # Contains API key variables

      vars:
        XCODE_SCHEME: "Darklick"
        XCODE_WORKSPACE: "ios/Darklick.xcworkspace"
        BUNDLE_ID: "com.darklick.yourapp"

    scripts:
      # 1️⃣ Install dependencies
      - name: Install dependencies
        script: |
          npm install

      # 2️⃣ Generate iOS project (REQUIRED for Windows users)
      - name: Generate iOS project
        script: |
          npx expo prebuild --platform ios --clean

      # 3️⃣ Install CocoaPods
      - name: Install CocoaPods
        script: |
          cd ios
          pod install
          cd ..

      # 4️⃣ Debug (optional but useful)
      - name: Verify iOS setup
        script: |
          echo "Listing ios folder:"
          ls -la ios

      # 5️⃣ Setup automatic code signing
      - name: Set up code signing
        script: |
          xcode-project use-profiles

      # 6️⃣ Build IPA (automatic signing handled here)
      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa

