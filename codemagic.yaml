workflows:
  ios-release:
    name: iOS Release Build (Darklick)

    environment:
      node: 18
      xcode: latest
      groups:
        - appstore-connect

      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.darklick.yourapp

    scripts:
      - name: Install deps
        script: npm install

      - name: Generate iOS
        script: npx expo prebuild --platform ios --clean

      - name: Install pods
        script: |
          cd ios
          pod install
          cd ..

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace ios/Darklick.xcworkspace \
            --scheme Darklick

    artifacts:
      - build/**/*.ipa

